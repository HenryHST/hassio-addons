---
name: Network UPS Tools
version: 1.2.0
slug: nut
description: Manage battery backup (UPS) devices
url: https://github.com/henryhst/hassio-addons/tree/main/nut
startup: system
arch:
  - aarch64
  - amd64
init: false
uart: true
udev: true
usb: true
apparmor: true
backup: cold
hassio_api: true
hassio_role: manager
services:
  - mqtt:want
ports:
  3493/tcp: null
ports_description:
  3493/tcp: Network UPS Tools
options:
  log_level: info
  users:
    - username: ""
      password: ""
      instcmds:
        - all
      actions: []
  devices:
    - name: myups
      driver: usbhid-ups
      port: auto
      config: []
  mode: netserver
  shutdown_host: false
  certverify: "0"
  forcessl: "0"
  enable_mqtt: true
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  mqtt_topic: nut/ups
  mqtt_poll_interval: 30
  mqtt_use_tls: false
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  users:
    - username: str
      password: password
      instcmds:
        - str
      actions:
        - str
      upsmon: list(master|slave|primary|secondary)?
  devices:
    - name: str
      driver: str
      port: str
      powervalue: int?
      config:
        - str
  mode: list(netserver|netclient)
  shutdown_host: bool
  list_usb_devices: bool?
  remote_ups_name: str?
  remote_ups_host: str?
  remote_ups_password: password?
  remote_ups_user: str?
  upsd_maxage: int?
  upsmon_deadtime: int?
  certverify: list(0|1)?
  forcessl: list(0|1)?
  i_like_to_be_pwned: bool?
  enable_mqtt: bool?
  mqtt_host: str?
  mqtt_port: port?
  mqtt_username: str?
  mqtt_password: password?
  mqtt_topic: str?
  mqtt_poll_interval: int(10,300)?
  mqtt_use_tls: bool?
