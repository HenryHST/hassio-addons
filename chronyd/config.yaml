---
name: Chrony NTP
version: 2.0.0
slug: chronyd
description: >-
  Chrony NTP server for Home Assistant — synchronize time from upstream NTP
  pools and serve time to devices on your LAN.
url: https://github.com/henryhst/hassio-addons/tree/main/chronyd
startup: system
arch:
  - aarch64
  - amd64
init: false
hassio_api: true
privileged:
  - SYS_TIME
host_network: false
map:
  - data:rw
backup: cold
apparmor: true
panel_icon: mdi:clock-outline
ports:
  123/udp: 123
ports_description:
  123/udp: NTP (Network Time Protocol)
options:
  set_system_clock: true
  mode: pool
  ntp_pool: pool.ntp.org
  ntp_server:
    - de.pool.ntp.org
  enable_nts: false
  enable_ptp: false
  log_level: info
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  set_system_clock: bool
  ntp_pool: str?
  ntp_server:
    - str?
  mode: list(pool|server)
  enable_nts: bool?
  enable_ptp: bool?
