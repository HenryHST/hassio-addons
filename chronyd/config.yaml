---
name: Chrony NTP
version: 2.2.0
slug: chronyd
description: >-
  Chrony NTP server for Home Assistant — synchronize time from upstream NTP
  pools and serve time to devices on your LAN.
url: https://github.com/henryhst/hassio-addons/tree/main/chronyd
startup: system
arch:
  - aarch64
  - amd64
init: false
hassio_api: true
privileged:
  - SYS_TIME
host_network: false
map:
  - data:rw
backup: cold
apparmor: true
panel_icon: mdi:clock-outline
ports:
  123/udp: 123
  9123/tcp: null
ports_description:
  123/udp: NTP (Network Time Protocol)
  9123/tcp: Prometheus metrics (chrony_exporter)
options:
  set_system_clock: true
  ntp_pool: pool.ntp.org
  ntp_server: []
  pool_maxsources: 4
  enable_nts: false
  enable_ptp: false
  enable_prometheus: false
  prometheus_port: 9123
  log_level: info
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)?
  set_system_clock: bool
  ntp_pool: str?
  ntp_server:
    - str?
  pool_maxsources: int(1,16)?
  mode: list(pool|server)?
  enable_nts: bool?
  enable_ptp: bool?
  enable_prometheus: bool?
  prometheus_port: int(1024,65535)?
