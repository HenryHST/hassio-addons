---
# Local development only — not used by Home Assistant Supervisor
services:
  chronyd:
    build: .
    image: chronyd:dev
    container_name: chronyd-dev
    restart: unless-stopped
    ports:
      - "123:123/udp"
    environment:
      - NTP_SERVERS=0.pool.ntp.org,1.pool.ntp.org,2.pool.ntp.org,3.pool.ntp.org
      - LOG_LEVEL=0
    volumes:
      - chronyd-data:/data
    command: ["/entrypoint.sh"]

volumes:
  chronyd-data:
