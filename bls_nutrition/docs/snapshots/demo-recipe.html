<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BLS Nährwertdatenbank – Rezept (Demo)</title>
  <link rel="stylesheet" href="../../root/static/styles/base.css">
  <link rel="stylesheet" href="../../root/static/styles/theme-diabetes.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-brand">
        <img src="../../root/static/icon.png" alt="BLS" class="header-logo" width="44" height="44">
        <div class="header-titles">
          <h1 class="header-title">BLS Nährwertdatenbank</h1>
          <p class="header-subtitle">BLS 4.0</p>
        </div>
      </div>
      <div class="header-actions">
        <span class="status-badge">7.140 LM</span>
        <button type="button" class="theme-toggle" aria-label="Darstellung wechseln">
          <span class="theme-toggle-icon" aria-hidden="true">◐</span>
        </button>
      </div>
    </header>

    <section class="hero-tiles" aria-label="Diabetes-Einheiten">
      <div class="hero-tile hero-tile-kh"><span class="hero-tile-label">gKH</span><span class="hero-tile-value">—</span></div>
      <div class="hero-tile hero-tile-be"><span class="hero-tile-label">BE</span><span class="hero-tile-value">—</span></div>
      <div class="hero-tile hero-tile-ke"><span class="hero-tile-label">KE</span><span class="hero-tile-value">—</span></div>
      <div class="hero-tile hero-tile-fpe"><span class="hero-tile-label">FPE</span><span class="hero-tile-value">—</span></div>
    </section>

    <main class="main">
      <div class="panel active" role="tabpanel">
        <h2 class="panel-title">Rezept berechnen</h2>
        <form class="form">
          <label class="label">Portionen</label>
          <input type="number" class="input input-narrow" value="2" readonly>

          <fieldset class="ingredient-fieldset">
            <legend>Zutat 1</legend>
            <div class="ingredient-row">
              <select class="input ingredient-source"><option selected>BLS</option><option>OFF</option></select>
              <input type="text" class="input ingredient-id" value="C110000" readonly>
              <input type="number" class="input ingredient-amount" value="200" readonly>
              <button type="button" class="ingredient-remove" aria-label="Entfernen">×</button>
            </div>
          </fieldset>

          <fieldset class="ingredient-fieldset">
            <legend>Zutat 2</legend>
            <div class="ingredient-row">
              <select class="input ingredient-source"><option>BLS</option><option selected>OFF</option></select>
              <input type="text" class="input ingredient-id" value="4008400407321" readonly>
              <input type="number" class="input ingredient-amount" value="50" readonly>
              <button type="button" class="ingredient-remove" aria-label="Entfernen">×</button>
            </div>
          </fieldset>

          <button type="button" class="btn btn-secondary">+ Zutat hinzufügen</button>
          <button type="button" class="btn btn-primary">Rezept berechnen</button>
        </form>
      </div>
    </main>

    <nav class="bottom-nav" aria-label="Navigation">
      <button type="button" class="nav-btn"><span class="nav-icon" aria-hidden="true">🔍</span><span class="nav-label">Suche</span></button>
      <button type="button" class="nav-btn"><span class="nav-icon" aria-hidden="true">📷</span><span class="nav-label">Scan</span></button>
      <button type="button" class="nav-btn"><span class="nav-icon" aria-hidden="true">🍽</span><span class="nav-label">Portion</span></button>
      <button type="button" class="nav-btn active" aria-current="page"><span class="nav-icon" aria-hidden="true">📋</span><span class="nav-label">Rezept</span></button>
    </nav>

    <footer class="footer">
      <p>Daten: Max Rubner-Institut BLS 4.0 (CC BY 4.0)</p>
      <p><em>Keine medizinische Beratung.</em></p>
    </footer>
  </div>
</body>
</html>
