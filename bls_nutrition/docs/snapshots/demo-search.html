<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BLS Nährwertdatenbank – Suche (Demo)</title>
  <link rel="stylesheet" href="../../root/static/styles/base.css">
  <link rel="stylesheet" href="../../root/static/styles/theme-diabetes.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-brand">
        <img src="../../root/static/icon.png" alt="BLS" class="header-logo" width="44" height="44">
        <div class="header-titles">
          <h1 class="header-title">BLS Nährwertdatenbank</h1>
          <p class="header-subtitle">BLS 4.0</p>
        </div>
      </div>
      <span class="status-badge">7.140 LM</span>
    </header>

    <section class="hero-tiles" aria-label="Diabetes-Einheiten">
      <div class="hero-tile hero-tile-kh">
        <span class="hero-tile-label">gKH</span>
        <span class="hero-tile-value">—</span>
      </div>
      <div class="hero-tile hero-tile-be">
        <span class="hero-tile-label">BE</span>
        <span class="hero-tile-value">—</span>
      </div>
      <div class="hero-tile hero-tile-ke">
        <span class="hero-tile-label">KE</span>
        <span class="hero-tile-value">—</span>
      </div>
      <div class="hero-tile hero-tile-fpe">
        <span class="hero-tile-label">FPE</span>
        <span class="hero-tile-value">—</span>
      </div>
    </section>

    <main class="main">
      <div class="panel active" role="tabpanel">
        <h2 class="panel-title">Lebensmittel suchen</h2>
        <form class="form">
          <input type="search" class="input" value="Apfel" readonly>
          <button type="button" class="btn btn-primary">Suchen</button>
        </form>
        <div class="search-results-grid search-layout-stacked">
          <section class="search-column">
            <h3 class="search-column-title">BLS 4.0</h3>
            <ul class="result-list">
              <li>
                <button type="button" class="result-item">
                  <span class="result-item-name">Apfel, roh</span>
                  <span class="result-item-meta">F110000</span>
                </button>
              </li>
              <li>
                <button type="button" class="result-item">
                  <span class="result-item-name">Apfel, gedünstet</span>
                  <span class="result-item-meta">F110100</span>
                </button>
              </li>
              <li>
                <button type="button" class="result-item">
                  <span class="result-item-name">Apfelsaft</span>
                  <span class="result-item-meta">N120000</span>
                </button>
              </li>
            </ul>
          </section>
          <section class="search-column">
            <h3 class="search-column-title">Open Food Facts</h3>
            <ul class="result-list">
              <li>
                <button type="button" class="result-item">
                  <span class="result-item-name">Apfelchips</span>
                  <span class="result-item-meta">4008400407321 · BioMarkt</span>
                </button>
              </li>
              <li>
                <button type="button" class="result-item">
                  <span class="result-item-name">Apfelmark</span>
                  <span class="result-item-meta">4005556001234 · Mühle</span>
                </button>
              </li>
            </ul>
          </section>
        </div>
      </div>
    </main>

    <nav class="bottom-nav" aria-label="Navigation">
      <button type="button" class="nav-btn active" aria-current="page">
        <span class="nav-icon" aria-hidden="true">🔍</span>
        <span class="nav-label">Suche</span>
      </button>
      <button type="button" class="nav-btn">
        <span class="nav-icon" aria-hidden="true">📷</span>
        <span class="nav-label">Scan</span>
      </button>
      <button type="button" class="nav-btn">
        <span class="nav-icon" aria-hidden="true">🍽</span>
        <span class="nav-label">Portion</span>
      </button>
      <button type="button" class="nav-btn">
        <span class="nav-icon" aria-hidden="true">📋</span>
        <span class="nav-label">Rezept</span>
      </button>
    </nav>

    <footer class="footer">
      <p>Daten: Max Rubner-Institut BLS 4.0 (CC BY 4.0)</p>
      <p><em>Keine medizinische Beratung.</em></p>
    </footer>
  </div>
</body>
</html>
