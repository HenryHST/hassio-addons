views:
  - title: BLS Nährwert
    path: bls-nutrition
    icon: mdi:food-apple
    cards:
      - type: markdown
        content: |
          ## BLS Nährwertrechner
          Lebensmittel suchen, Barcode scannen, Portionen und Rezepte berechnen.
          *Keine medizinische Beratung.*

      - type: entities
        title: Datenbank
        show_header_toggle: false
        entities:
          - entity: sensor.bls_nutrition_food_count
          - entity: sensor.bls_nutrition_bls_version

      - type: horizontal-stack
        cards:
          - type: entity
            entity: input_text.bls_search_query
            name: Suche
          - type: button
            name: Suchen
            icon: mdi:magnify
            tap_action:
              action: call-service
              service: bls_nutrition.search_food
              data:
                query: "{{ states('input_text.bls_search_query') }}"

      - type: entity
        entity: sensor.bls_nutrition_search_hits
        name: Suchtreffer

      - type: markdown
        title: Suchergebnisse
        content: >
          {% set results = state_attr('sensor.bls_nutrition_search_hits', 'results') or [] %}
          {% if results | length == 0 %}
          *Keine Suche ausgeführt oder keine Treffer.*
          {% else %}
          {% for item in results[:8] %}
          - **{{ item.name }}** (`{{ item.id }}`, {{ item.source }})
          {% endfor %}
          {% endif %}

      - type: horizontal-stack
        cards:
          - type: entity
            entity: input_text.bls_barcode
            name: Barcode (EAN)
          - type: button
            name: Scannen
            icon: mdi:barcode
            tap_action:
              action: call-service
              service: bls_nutrition.lookup_barcode
              data:
                barcode: "{{ states('input_text.bls_barcode') }}"

      - type: horizontal-stack
        cards:
          - type: entity
            entity: input_select.bls_food_source
            name: Quelle
          - type: entity
            entity: input_text.bls_food_id
            name: ID
          - type: entity
            entity: input_number.bls_amount_g
            name: Menge (g)

      - type: button
        name: Portion berechnen
        icon: mdi:calculator
        tap_action:
          action: call-service
          service: bls_nutrition.calculate_portion
          data:
            source: "{{ states('input_select.bls_food_source') }}"
            id: "{{ states('input_text.bls_food_id') }}"
            amount_g: "{{ states('input_number.bls_amount_g') | float }}"

      - type: glance
        title: Diabetes-Einheiten
        show_name: true
        entities:
          - entity: sensor.bls_nutrition_g_kh
          - entity: sensor.bls_nutrition_be
          - entity: sensor.bls_nutrition_ke
          - entity: sensor.bls_nutrition_fpe

      - type: entities
        title: Nährwerte (letzte Berechnung)
        show_header_toggle: false
        entities:
          - entity: sensor.bls_nutrition_last_food
          - entity: sensor.bls_nutrition_energy_kcal
          - entity: sensor.bls_nutrition_protein
          - entity: sensor.bls_nutrition_fat
          - entity: sensor.bls_nutrition_carbs
          - entity: sensor.bls_nutrition_nutriscore
          - entity: sensor.bls_nutrition_nova
          - entity: sensor.bls_nutrition_ecoscore

      - type: markdown
        title: Rezept (bis zu 3 Zutaten)
        content: |
          *Nutri-Score, Nova-Score und Eco-Score nur bei Open-Food-Facts-Produkten (Quelle OFF).*

          Trage Quelle (`bls`, `off`, `custom`), ID und Menge ein, dann **Rezept berechnen**.

      - type: grid
        columns: 3
        square: false
        cards:
          - type: entities
            title: Zutat 1
            entities:
              - input_select.bls_ingredient_1_source
              - input_text.bls_ingredient_1_id
              - input_number.bls_ingredient_1_g
          - type: entities
            title: Zutat 2
            entities:
              - input_select.bls_ingredient_2_source
              - input_text.bls_ingredient_2_id
              - input_number.bls_ingredient_2_g
          - type: entities
            title: Zutat 3
            entities:
              - input_select.bls_ingredient_3_source
              - input_text.bls_ingredient_3_id
              - input_number.bls_ingredient_3_g

      - type: horizontal-stack
        cards:
          - type: entity
            entity: input_number.bls_recipe_servings
            name: Portionen
          - type: button
            name: Rezept berechnen
            icon: mdi:food
            tap_action:
              action: call-service
              service: script.bls_nutrition_calculate_recipe

      - type: markdown
        content: |
          **Datenquellen:** Max Rubner-Institut BLS 4.0 (CC BY 4.0),
          Open Food Facts (ODbL)
