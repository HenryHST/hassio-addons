# BLS Nährwertdatenbank — Helper und Scripte
# In configuration.yaml einbinden:
# homeassistant:
#   packages: !include_dir_named packages
# Dann diesen Ordner nach config/packages/ kopieren.

input_text:
  bls_search_query:
    name: BLS Suche
    icon: mdi:magnify
    max: 100
  bls_barcode:
    name: BLS Barcode
    icon: mdi:barcode
    max: 32
  bls_food_id:
    name: BLS Lebensmittel ID
    icon: mdi:identifier
    max: 64
  bls_ingredient_1_id:
    name: BLS Zutat 1 ID
    max: 64
  bls_ingredient_2_id:
    name: BLS Zutat 2 ID
    max: 64
  bls_ingredient_3_id:
    name: BLS Zutat 3 ID
    max: 64
  bls_favorites_export_path:
    name: BLS Favoriten Export
    icon: mdi:export
    max: 255
    initial: /config/bls-favorites.json
  bls_favorites_import_path:
    name: BLS Favoriten Import
    icon: mdi:import
    max: 255
    initial: /config/bls-favorites.json

input_number:
  bls_amount_g:
    name: BLS Menge
    min: 1
    max: 5000
    step: 1
    unit_of_measurement: g
    icon: mdi:scale
  bls_recipe_servings:
    name: BLS Rezept Portionen
    min: 1
    max: 20
    step: 1
    icon: mdi:food
  bls_ingredient_1_g:
    name: BLS Zutat 1 Menge
    min: 0
    max: 5000
    step: 1
    unit_of_measurement: g
  bls_ingredient_2_g:
    name: BLS Zutat 2 Menge
    min: 0
    max: 5000
    step: 1
    unit_of_measurement: g
  bls_ingredient_3_g:
    name: BLS Zutat 3 Menge
    min: 0
    max: 5000
    step: 1
    unit_of_measurement: g

input_select:
  bls_food_source:
    name: BLS Quelle
    options:
      - bls
      - off
      - custom
    icon: mdi:database
  bls_ingredient_1_source:
    name: BLS Zutat 1 Quelle
    options:
      - bls
      - off
      - custom
  bls_ingredient_2_source:
    name: BLS Zutat 2 Quelle
    options:
      - bls
      - off
      - custom
  bls_ingredient_3_source:
    name: BLS Zutat 3 Quelle
    options:
      - bls
      - off
      - custom
  bls_favorites_format:
    name: BLS Favoriten Format
    options:
      - json
      - csv
    icon: mdi:file-document
  bls_favorites_import_mode:
    name: BLS Favoriten Import Modus
    options:
      - merge
      - replace
    icon: mdi:database-import

script:
  bls_nutrition_calculate_recipe:
    alias: BLS Rezept berechnen
    mode: single
    sequence:
      - variables:
          ingredients: >-
            {% set ns = namespace(items=[]) %}
            {% for i in range(1, 4) %}
              {% set source = states('input_select.bls_ingredient_' ~ i ~ '_source') %}
              {% set id = states('input_text.bls_ingredient_' ~ i ~ '_id') %}
              {% set amount = states('input_number.bls_ingredient_' ~ i ~ '_g') | float(0) %}
              {% if id not in ['', 'unknown', 'unavailable'] and amount > 0 %}
                {% set ns.items = ns.items + [{'source': source, 'id': id, 'amount_g': amount}] %}
              {% endif %}
            {% endfor %}
            {{ ns.items }}
      - condition: template
        value_template: "{{ ingredients | length > 0 }}"
      - service: bls_nutrition.calculate_recipe
        data:
          servings: "{{ states('input_number.bls_recipe_servings') | int(1) }}"
          ingredients: "{{ ingredients }}"

  bls_nutrition_export_favorites:
    alias: BLS Favoriten exportieren
    mode: single
    sequence:
      - service: bls_nutrition.export_favorites
        data:
          format: "{{ states('input_select.bls_favorites_format') }}"
          file_path: "{{ states('input_text.bls_favorites_export_path') }}"

  bls_nutrition_import_favorites:
    alias: BLS Favoriten importieren
    mode: single
    sequence:
      - service: bls_nutrition.import_favorites
        data:
          file_path: "{{ states('input_text.bls_favorites_import_path') }}"
          mode: "{{ states('input_select.bls_favorites_import_mode') }}"
