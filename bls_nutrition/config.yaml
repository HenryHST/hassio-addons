---
name: BLS Nährwertdatenbank
version: 1.8.2
slug: bls_nutrition
description: >-
  Bundeslebensmittelschlüssel (BLS) 4.0 Nährwertdatenbank mit Open Food Facts
  Barcode-Lookup, Diabetes-Einheiten (gKH, BE, KE, FPE) und REST-API für
  Home Assistant.
url: https://github.com/henryhst/hassio-addons/tree/main/bls_nutrition
image: ghcr.io/henryhst/hassio-addons/bls_nutrition
startup: application
arch:
  - aarch64
  - amd64
init: false
hassio_api: true
hassio_role: default
homeassistant_api: true
ingress: true
ingress_port: 8090
panel_icon: mdi:food-apple
panel_title: BLS Nährwert
panel_admin: false
map:
  - data:rw
apparmor: true
ports:
  8090/tcp: 8090
ports_description:
  8090/tcp: REST-API und Web-Status
options:
  auto_update: true
  update_interval_days: 30
  language: de
  enable_open_food_facts: true
  off_cache_ttl_days: 90
  off_search_cache_ttl_days: 7
  search_layout: stacked
  search_recents_enabled: true
  todo_list_enabled: true
  todo_list_entity_id: todo.shopping_list
  map_enabled: false
  map_radius_km: 20
  favorites_enabled: true
schema:
  auto_update: bool
  update_interval_days: int(7,365)?
  language: list(de|en)?
  enable_open_food_facts: bool?
  off_cache_ttl_days: int(1,365)?
  off_search_cache_ttl_days: int(1,90)?
  search_layout: list(stacked|side_by_side)?
  search_recents_enabled: bool?
  todo_list_enabled: bool?
  todo_list_entity_id: str?
  map_enabled: bool?
  map_radius_km: int(1,50)?
  favorites_enabled: bool?
