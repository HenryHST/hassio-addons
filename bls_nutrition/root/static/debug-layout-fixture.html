<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/theme-diabetes.css">
  <style>
    body { margin: 0; }
    .app { max-width: 640px; margin: 0 auto; padding: 1rem; }
  </style>
</head>
<body>
  <div class="app">
    <div class="search-results-grid search-layout-side-by-side" id="grid">
      <section class="search-column">
        <ul class="result-list">
          <li class="result-item-wrap is-expanded">
            <button type="button" class="result-item">Rheinische Mutzen</button>
            <div class="quick-portion">
              <div class="portion-chips">
                <button type="button" class="portion-chip">50 g</button>
                <button type="button" class="portion-chip">100 g</button>
                <button type="button" class="portion-chip">150 g</button>
              </div>
              <div class="portion-custom">
                <input type="number" class="input input-narrow portion-custom-input" value="100">
                <button type="button" class="btn btn-primary btn-sm">Berechnen</button>
              </div>
            </div>
          </li>
        </ul>
      </section>
      <section class="search-column">
        <ul class="result-list">
          <li class="result-item-wrap">
            <button type="button" class="result-item">Noodle Cup Chili</button>
          </li>
        </ul>
      </section>
    </div>
  </div>
</body>
</html>
