---
name: Test BLS Nährwertdatenbank

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'bls_nutrition/**'
      - '.github/workflows/test-bls-nutrition.yaml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'bls_nutrition/**'
      - '.github/workflows/test-bls-nutrition.yaml'
  workflow_dispatch:

jobs:
  pytest:
    name: Python unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bls_nutrition
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest tests -v

  hassfest:
    name: Validate HA integration (hassfest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Prepare custom_components layout
        run: |
          mkdir -p custom_components
          cp -r bls_nutrition/integration/custom_components/bls_nutrition custom_components/

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  ruff:
    name: Ruff lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bls_nutrition
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'

      - name: Install ruff
        run: pip install ruff==0.12.3

      - name: Run ruff
        run: ruff check tests
