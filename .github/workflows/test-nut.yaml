---
name: Test Network UPS Tools

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'nut/**'
      - '.github/workflows/test-nut.yaml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'nut/**'
      - '.github/workflows/test-nut.yaml'
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck (add-on scripts)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./nut
          severity: warning
          ignore_paths: tests

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Run tests
        run: bash nut/tests/run-tests.sh
