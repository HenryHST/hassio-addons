---
name: Test netboot.xyz

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'netboot_xyz/**'
      - '.github/workflows/test-netboot-xyz.yaml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'netboot_xyz/**'
      - '.github/workflows/test-netboot-xyz.yaml'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  shellcheck:
    name: ShellCheck (add-on scripts)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./netboot_xyz/root
          severity: warning

  nginx-config:
    name: nginx configuration syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Validate nginx configs
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx gettext-base
          export NETBOOTXYZ_VERSION=0.7.6
          mkdir -p /tmp/netboot-config/nginx/site-confs /tmp/netboot-config/log/nginx
          cp netboot_xyz/root/defaults/nginx.conf /tmp/netboot-config/nginx/nginx.conf
          envsubst < netboot_xyz/root/defaults/default > /tmp/netboot-config/nginx/site-confs/default
          sed -i 's#/config#/tmp/netboot-config#g' /tmp/netboot-config/nginx/nginx.conf
          sed -i 's#/config#/tmp/netboot-config#g' /tmp/netboot-config/nginx/site-confs/default
          nginx -t -c /tmp/netboot-config/nginx/nginx.conf

  npm-audit:
    name: npm audit (webapp dependencies)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install webapp and run npm audit
        run: |
          NETBOOTXYZ_VERSION=$(grep 'NETBOOTXYZ_VERSION=' netboot_xyz/Dockerfile | head -1 | cut -d'"' -f2)
          echo "netboot.xyz webapp version: ${NETBOOTXYZ_VERSION}"
          curl -fsSL -o /tmp/webapp.tar.gz \
            "https://github.com/netbootxyz/webapp/archive/${NETBOOTXYZ_VERSION}.tar.gz"
          mkdir -p /tmp/webapp
          tar xzf /tmp/webapp.tar.gz -C /tmp/webapp --strip-components=1
          cd /tmp/webapp
          npm install --omit=dev
          npm install systeminformation@5.27.14 express@4.22.2 js-yaml@4.3.0 --save --omit=dev
          npm audit fix --omit=dev
          npm audit --omit=dev --audit-level=high
