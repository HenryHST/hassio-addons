---
name: Build NUT Addon

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'nut/**'
      - '.github/workflows/build-nut.yaml'
  pull_request:
    paths:
      - 'nut/**'
  release:
    types: [published]
  workflow_dispatch:

env:
  ADDON_NAME: nut
  REGISTRY: ghcr.io

jobs:
  information:
    name: Gather addon information
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.information.outputs.version }}
      build_date: ${{ steps.information.outputs.build_date }}
      architectures: ${{ steps.information.outputs.architectures }}
      description: ${{ steps.information.outputs.description }}
      name: ${{ steps.information.outputs.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Get addon information
        id: information
        run: |
          # Read config.yaml
          version=$(yq eval '.version' nut/config.yaml)
          name=$(yq eval '.name' nut/config.yaml)
          description=$(yq eval '.description' nut/config.yaml)
          architectures=$(yq eval -o=json '.arch' nut/config.yaml | jq -c)
          build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')

          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "name=${name}" >> $GITHUB_OUTPUT
          echo "description=${description}" >> $GITHUB_OUTPUT
          echo "architectures=${architectures}" >> $GITHUB_OUTPUT
          echo "build_date=${build_date}" >> $GITHUB_OUTPUT

          echo "### Addon Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Name:** ${name}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${version}" >> $GITHUB_STEP_SUMMARY
          echo "- **Architectures:** ${architectures}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Date:** ${build_date}" >> $GITHUB_STEP_SUMMARY

  build:
    name: Build ${{ matrix.arch }} image
    needs: information
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, amd64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Map architecture to Docker platform
        id: platform
        run: |
          case "${{ matrix.arch }}" in
            aarch64)
              echo "platform=linux/arm64" >> $GITHUB_OUTPUT
              ;;
            amd64)
              echo "platform=linux/amd64" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Generate image metadata
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${{ env.REGISTRY }}/${REPO_LOWER}/${{ env.ADDON_NAME }}"

          TAGS="${IMAGE_NAME}:${{ needs.information.outputs.version }}-${{ matrix.arch }}"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            TAGS="${TAGS},${IMAGE_NAME}:latest-${{ matrix.arch }}"
          fi

          echo "image_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./nut
          file: ./nut/Dockerfile
          platforms: ${{ steps.platform.outputs.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=${{ needs.information.outputs.name }}
            org.opencontainers.image.description=${{ needs.information.outputs.description }}
            org.opencontainers.image.version=${{ needs.information.outputs.version }}
            org.opencontainers.image.created=${{ needs.information.outputs.build_date }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BUILD_VERSION=${{ needs.information.outputs.version }}
            BUILD_DATE=${{ needs.information.outputs.build_date }}
            BUILD_REF=${{ github.sha }}
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_NAME=${{ needs.information.outputs.name }}
            BUILD_DESCRIPTION=${{ needs.information.outputs.description }}
            BUILD_REPOSITORY=${{ github.repository }}
          cache-from: type=gha,scope=${{ env.ADDON_NAME }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ env.ADDON_NAME }}-${{ matrix.arch }}

      - name: Install Cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image with Cosign
        if: github.event_name != 'pull_request'
        env:
          COSIGN_EXPERIMENTAL: "true"
        run: |
          IMAGE_DIGEST="${{ steps.build.outputs.digest }}"
          cosign sign --yes "${{ steps.meta.outputs.image_name }}@${IMAGE_DIGEST}"

      - name: Generate build summary
        run: |
          echo "### Build Summary - ${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** ${{ steps.platform.outputs.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Signed:** ${{ github.event_name != 'pull_request' }}" >> $GITHUB_STEP_SUMMARY

  manifest:
    name: Create multi-arch manifest
    if: github.event_name != 'pull_request'
    needs: [information, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${{ env.REGISTRY }}/${REPO_LOWER}/${{ env.ADDON_NAME }}"
          VERSION="${{ needs.information.outputs.version }}"

          collect_tags() {
            local prefix="$1"
            local -n out_ref="$2"
            out_ref=()
            for arch in aarch64 amd64; do
              tag="${IMAGE_NAME}:${prefix}${arch}"
              if docker buildx imagetools inspect "${tag}" >/dev/null 2>&1; then
                out_ref+=("${tag}")
                echo "Including ${tag}"
              else
                echo "Skipping missing ${tag}"
              fi
            done
          }

          collect_tags "${VERSION}-" version_tags
          if [[ ${#version_tags[@]} -lt 2 ]]; then
            echo "Need at least 2 architecture images for ${IMAGE_NAME}:${VERSION}"
            exit 1
          fi

          docker buildx imagetools create -t "${IMAGE_NAME}:${VERSION}" "${version_tags[@]}"

          if [[ "${{ github.ref }}" == "refs/heads/main" ]] || [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            collect_tags "latest-" latest_tags
            if [[ ${#latest_tags[@]} -ge 2 ]]; then
              docker buildx imagetools create -t "${IMAGE_NAME}:latest" "${latest_tags[@]}"
            fi
          fi

          echo "### Manifest Created" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${IMAGE_NAME}:${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Architectures in manifest:** ${#version_tags[@]}" >> $GITHUB_STEP_SUMMARY
