---
name: Test Chrony NTP

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'chronyd/**'
      - '.github/workflows/test-chronyd.yaml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'chronyd/**'
      - '.github/workflows/test-chronyd.yaml'
  workflow_dispatch:

jobs:
  smoke:
    name: Container smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build image
        run: |
          docker build -t chronyd:test \
            --build-arg BUILD_VERSION=2.1.0 \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg BUILD_REF=test \
            --build-arg BUILD_ARCH=amd64 \
            --build-arg BUILD_NAME="Chrony NTP" \
            --build-arg BUILD_DESCRIPTION="Chrony NTP smoke test" \
            --build-arg BUILD_REPOSITORY=henryhst/hassio-addons \
            ./chronyd

      - name: Run smoke test
        run: |
          set -euo pipefail
          data_dir="$(mktemp -d)"
          network="chronyd-smoke-$$"
          sup_cid=""
          cid=""

          echo '{"ntp_pool":"pool.ntp.org","ntp_server":["0.pool.ntp.org"],"pool_maxsources":4,'\
            '"set_system_clock":false,"enable_nts":false,"enable_ptp":false,"log_level":"info"}' \
            > "${data_dir}/options.json"

          cat > "${data_dir}/mock-supervisor.py" << 'PY'
          #!/usr/bin/env python3
          import http.server
          import socketserver

          class Handler(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == "/addons/self/options/config":
                      with open("/data/options.json", "rb") as f:
                          body = f.read()
                      self.send_response(200)
                      self.send_header("Content-Type", "application/json")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)
                  else:
                      self.send_response(404)
                      self.end_headers()

              def log_message(self, *_args):
                  pass

          with socketserver.TCPServer(("0.0.0.0", 80), Handler) as httpd:
              print("mock supervisor listening on :80", flush=True)
              httpd.serve_forever()
          PY

          fail() {
            echo "::group::Mock supervisor logs"
            docker logs "${sup_cid}" 2>&1 || true
            echo "::endgroup::"
            echo "::group::Container logs"
            docker logs "${cid}" 2>&1 || true
            echo "::endgroup::"
            exit 1
          }

          cleanup() {
            docker rm -f "${cid}" >/dev/null 2>&1 || true
            docker rm -f "${sup_cid}" >/dev/null 2>&1 || true
            docker network rm "${network}" >/dev/null 2>&1 || true
            docker run --rm --user root \
              -v "${data_dir}:/data" \
              debian:bookworm-slim \
              chown -R "$(id -u):$(id -g)" /data >/dev/null 2>&1 || true
            rm -rf "${data_dir}"
          }
          trap cleanup EXIT

          docker network create "${network}"

          sup_cid=$(docker run -d --name "chronyd-mock-supervisor-$$" \
            --network "${network}" --network-alias supervisor \
            -v "${data_dir}:/data:ro" \
            python:3-alpine \
            python /data/mock-supervisor.py)

          for _ in $(seq 1 15); do
            if docker logs "${sup_cid}" 2>&1 | grep -q "listening on"; then
              break
            fi
            sleep 1
          done
          docker logs "${sup_cid}" 2>&1 | grep -q "listening on" || fail

          cid=$(docker run -d --name chronyd-smoke \
            --network "${network}" \
            -e SUPERVISOR_API=http://supervisor \
            --cap-add SYS_TIME \
            -v "${data_dir}:/data" \
            -p 10123:123/udp \
            chronyd:test) || fail

          for _ in $(seq 1 45); do
            if docker logs "${cid}" 2>&1 | grep -q "Starting chronyd"; then
              break
            fi
            sleep 1
          done

          docker logs "${cid}" 2>&1 | grep -q "Chrony NTP Add-on" || fail
          docker logs "${cid}" 2>&1 | grep -q "Adding pool pool.ntp.org" || fail
          docker logs "${cid}" 2>&1 | grep -q "Adding server 0.pool.ntp.org" || fail
          docker logs "${cid}" 2>&1 | grep -q "Starting chronyd" || fail
          docker logs "${cid}" 2>&1 | grep -q "Drift file: /data/chronyd/lib/chrony.drift" || fail

          for _ in $(seq 1 30); do
            if nc -zu localhost 10123 2>/dev/null; then
              break
            fi
            sleep 1
          done
          nc -zu localhost 10123 || fail

          docker exec "${cid}" chronyc -n tracking || fail
