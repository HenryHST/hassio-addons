---
name: Test Chrony NTP

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'chronyd/**'
      - '.github/workflows/test-chronyd.yaml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'chronyd/**'
      - '.github/workflows/test-chronyd.yaml'
  workflow_dispatch:

jobs:
  smoke:
    name: Container smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Build image
        run: |
          docker build -t chronyd:test \
            --build-arg BUILD_VERSION=1.0.0 \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg BUILD_REF=test \
            --build-arg BUILD_ARCH=amd64 \
            --build-arg BUILD_NAME="Chrony NTP" \
            --build-arg BUILD_DESCRIPTION="Chrony NTP smoke test" \
            --build-arg BUILD_REPOSITORY=henryhst/hassio-addons \
            ./chronyd

      - name: Run smoke test
        run: |
          set -euo pipefail
          data_dir="$(mktemp -d)"
          cat > "${data_dir}/options.json" <<'EOF'
          {
            "ntp_servers": "0.pool.ntp.org,1.pool.ntp.org",
            "enable_nts": false,
            "enable_sysclk": false,
            "noclientlog": false,
            "log_level": 0,
            "timezone": "UTC",
            "enable_ptp": false
          }
          EOF

          cid=$(docker run -d --name chronyd-smoke \
            -v "${data_dir}:/data" \
            -p 10123:123/udp \
            chronyd:test)

          cleanup() {
            docker rm -f "${cid}" >/dev/null 2>&1 || true
            rm -rf "${data_dir}"
          }
          trap cleanup EXIT

          for _ in $(seq 1 45); do
            if docker logs "${cid}" 2>&1 | grep -q "Chrony NTP Add-on"; then
              break
            fi
            sleep 1
          done

          docker logs "${cid}" | grep -q "Chrony NTP Add-on"
          docker logs "${cid}" | grep -q "Drift file: /data/chronyd/lib/chrony.drift"

          for _ in $(seq 1 30); do
            if nc -zu localhost 10123 2>/dev/null; then
              break
            fi
            sleep 1
          done
          nc -zu localhost 10123

          docker exec "${cid}" chronyc -n tracking
