---
name: netboot.xyz
version: 1.0.8
slug: netboot_xyz
description: >-
  netboot_xyz is a convenient place to boot into any type of operating system
  or utility disk without the need of having to go spend time retrieving the ISO
  just to run it
url: https://github.com/henryhst/hassio-addons/tree/main/netboot_xyz
arch:
  - aarch64
  - amd64
map:
  - config:rw
  - ssl
boot: manual
apparmor: true
backup: cold
host_network: false
host_pid: false
panel_admin: true
hassio_api: true
hassio_role: default
init: false
ingress: true
ingress_port: 3000
ingress_stream: true
journald: true
panel_icon: mdi:ip
panel_title: netboot.xyz
homeassistant_api: true
webui: http://[HOST]:[PORT:3000]
services:
  - mqtt:want
options:
  menu_version: ""
schema:
  menu_version: str?
ports:
  3000/tcp: 3000
  69/udp: 69
  80/tcp: 8080
ports_description:
  3000/tcp: Web configuration interface
  69/udp: TFTP Port
  80/tcp: NGINX server for hosting assets
